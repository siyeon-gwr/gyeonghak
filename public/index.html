<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국경학자료집성 - 한중 경학 원전 통합 열람</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;700&family=Noto+Serif+SC:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --ink-mid: #3d3530;
  --ink-light: #7a6e65;
  --paper: #faf8f4;
  --paper-warm: #f2ede3;
  --paper-border: #ddd5c4;
  --red: #8b1a1a;
  --red-light: #c94040;
  --gold: #a07830;
  --accent: #2c5f8a;
  --accent-light: #4a8ab5;
  --sidebar-w: 260px;
  --header-h: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
}

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--ink);
  display: flex; align-items: center;
  padding: 0 24px;
  z-index: 100;
  gap: 24px;
}
#header .logo {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  color: #e8e0d0;
  letter-spacing: 2px;
  white-space: nowrap;
  cursor: pointer;
}
#header .logo span {
  color: var(--gold);
  margin-right: 6px;
  font-size: 18px;
}
#search-bar {
  flex: 1; max-width: 480px;
  display: flex; gap: 0;
}
#search-input {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-right: none;
  color: #e8e0d0;
  padding: 0 14px;
  height: 34px;
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  outline: none;
  border-radius: 3px 0 0 3px;
}
#search-input::placeholder { color: rgba(255,255,255,0.35); }
#search-input:focus { background: rgba(255,255,255,0.12); border-color: var(--gold); }
#search-btn {
  background: var(--gold);
  border: none; cursor: pointer;
  padding: 0 14px; height: 34px;
  color: #fff;
  font-size: 14px;
  border-radius: 0 3px 3px 0;
  transition: background 0.2s;
}
#search-btn:hover { background: #c09040; }

/* ── LAYOUT ── */
#layout {
  display: flex;
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
}

/* ── SIDEBAR ── */
#sidebar {
  width: var(--sidebar-w);
  background: var(--paper-warm);
  border-right: 1px solid var(--paper-border);
  position: fixed;
  top: var(--header-h);
  bottom: 0;
  overflow-y: auto;
  padding: 16px 0;
}
.sidebar-section { margin-bottom: 8px; }
.sidebar-title {
  padding: 6px 16px;
  font-size: 11px;
  color: var(--ink-light);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
}
.classic-item {
  display: flex; align-items: center;
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.15s;
  gap: 10px;
}
.classic-item:hover { background: rgba(0,0,0,0.05); }
.classic-item.active { background: var(--red); color: #fff; }
.classic-item.active .classic-cn { color: #ffcca0; }
.classic-item.active .classic-count { color: rgba(255,255,255,0.7); }
.classic-cn {
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  color: var(--ink);
  min-width: 28px;
}
.classic-kr { font-size: 13px; color: var(--ink-mid); flex: 1; }
.classic-count { font-size: 11px; color: var(--ink-light); }

/* 장 목록 in sidebar */
.chapter-list { padding: 4px 0 8px 0; }
.chapter-item {
  padding: 5px 16px 5px 44px;
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  color: var(--ink-mid);
  cursor: pointer;
  display: flex; justify-content: space-between;
  transition: background 0.15s;
}
.chapter-item:hover { background: rgba(0,0,0,0.04); color: var(--red); }
.chapter-item.active { color: var(--red); font-weight: 500; }
.chapter-count { font-size: 11px; color: var(--ink-light); }

/* ── MAIN ── */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  padding: 32px 40px;
  max-width: 1100px;
}

/* ── HOME ── */
.home-header {
  text-align: center;
  padding: 48px 0 40px;
  border-bottom: 1px solid var(--paper-border);
  margin-bottom: 40px;
}
.home-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 28px;
  color: var(--ink);
  letter-spacing: 4px;
  margin-bottom: 8px;
}
.home-title-cn {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  color: var(--ink-light);
  letter-spacing: 8px;
  margin-bottom: 16px;
}
.home-desc {
  font-size: 14px;
  color: var(--ink-light);
  line-height: 1.8;
}
.stats-row {
  display: flex; gap: 32px; justify-content: center;
  margin-top: 24px;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Noto Serif KR', serif;
  font-size: 28px;
  color: var(--red);
}
.stat-label { font-size: 12px; color: var(--ink-light); margin-top: 2px; }

.classics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}
.classic-card {
  background: #fff;
  border: 1px solid var(--paper-border);
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
}
.classic-card:hover {
  border-color: var(--red);
  box-shadow: 0 4px 16px rgba(139,26,26,0.08);
  transform: translateY(-2px);
}
.card-cn {
  font-family: 'Noto Serif KR', serif;
  font-size: 32px;
  color: var(--ink);
  margin-bottom: 4px;
}
.card-kr { font-size: 13px; color: var(--ink-mid); margin-bottom: 12px; }
.card-stats { font-size: 12px; color: var(--ink-light); line-height: 1.8; }
.card-stats span { color: var(--red); font-weight: 500; }

/* ── CHAPTER VIEW (핵심) ── */
.chapter-view-header {
  border-bottom: 2px solid var(--ink);
  padding-bottom: 16px;
  margin-bottom: 24px;
}
.chapter-view-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 24px;
  color: var(--ink);
  display: flex; align-items: baseline; gap: 12px;
}
.chapter-view-classic {
  font-size: 14px;
  color: var(--ink-light);
  font-family: 'Noto Sans KR', sans-serif;
}
.chapter-stats {
  font-size: 13px; color: var(--ink-light);
  margin-top: 6px;
}
.chapter-stats strong { color: var(--red); }

/* 필터바 */
.filter-bar {
  display: flex; gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 4px 12px;
  border: 1px solid var(--paper-border);
  background: #fff;
  cursor: pointer;
  font-size: 12px;
  color: var(--ink-mid);
  border-radius: 2px;
  transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}

/* 원문 섹션 */
.source-block {
  margin-bottom: 28px;
  border: 1px solid var(--paper-border);
  border-radius: 2px;
  overflow: hidden;
}
.source-block-header {
  background: var(--ink);
  color: #e8e0d0;
  padding: 10px 16px;
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  letter-spacing: 1px;
  display: flex; justify-content: space-between; align-items: center;
}
.source-block-header.chinese { background: #2c3e50; }
.source-block-header.jizhu { background: #1a3a2a; }
.source-block-content {
  padding: 16px 20px;
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  line-height: 2;
  color: var(--ink);
  background: #fff;
}

/* 한국 주석 집성 */
.annotation-section { margin-bottom: 40px; }
.annotation-section-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 16px;
  color: var(--ink);
  padding: 8px 0;
  border-bottom: 1px solid var(--paper-border);
  margin-bottom: 16px;
  display: flex; justify-content: space-between;
}
.annotation-count {
  font-size: 13px; color: var(--red);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 400;
}

.annotation-card {
  background: #fff;
  border: 1px solid var(--paper-border);
  margin-bottom: 12px;
  border-radius: 2px;
}
.annotation-card-header {
  padding: 10px 16px;
  background: var(--paper-warm);
  border-bottom: 1px solid var(--paper-border);
  display: flex; gap: 12px; align-items: baseline;
  cursor: pointer;
}
.ann-book-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  color: var(--ink);
}
.ann-meta {
  font-size: 12px;
  color: var(--ink-light);
}
.ann-chars { font-size: 11px; color: var(--ink-light); margin-left: auto; }
.annotation-card-body {
  padding: 16px 20px;
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  line-height: 2.2;
  color: var(--ink-mid);
  white-space: pre-wrap;
  display: none;
}
.annotation-card-body.open { display: block; }
.annotation-card.expanded .annotation-card-body { display: block; }

/* ── BOOK VIEW ── */
.book-view {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 24px;
}
.book-toc {
  position: sticky;
  top: 80px;
  align-self: start;
}
.book-toc-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--ink-light);
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--paper-border);
}
.toc-item {
  padding: 5px 8px;
  font-size: 13px;
  color: var(--ink-mid);
  cursor: pointer;
  border-radius: 2px;
  display: flex; justify-content: space-between;
  font-family: 'Noto Serif SC', serif;
}
.toc-item:hover { background: var(--paper-warm); color: var(--red); }
.toc-chapter-link {
  font-size: 10px;
  color: var(--accent);
  text-decoration: none;
  white-space: nowrap;
}
.toc-chapter-link:hover { text-decoration: underline; }
.book-content { }
.book-header {
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--ink);
}
.book-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 24px;
  margin-bottom: 8px;
}
.book-meta-row {
  display: flex; gap: 16px;
  font-size: 13px; color: var(--ink-light);
}
.book-haeje {
  background: var(--paper-warm);
  border: 1px solid var(--paper-border);
  padding: 16px 20px;
  font-size: 13px;
  line-height: 2;
  margin-bottom: 24px;
  border-radius: 2px;
}
.section-block { margin-bottom: 24px; }
.section-header {
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  color: var(--ink);
  padding: 8px 0;
  border-bottom: 1px solid var(--paper-border);
  margin-bottom: 12px;
  display: flex; justify-content: space-between; align-items: center;
}
.go-chapter-btn {
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
  border: 1px solid var(--accent-light);
  padding: 2px 8px;
  border-radius: 2px;
  background: none;
  transition: all 0.15s;
}
.go-chapter-btn:hover { background: var(--accent); color: #fff; }
.section-content {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  line-height: 2.2;
  color: var(--ink-mid);
  white-space: pre-wrap;
}

/* ── SEARCH RESULTS ── */
.search-result-item {
  background: #fff;
  border: 1px solid var(--paper-border);
  padding: 14px 18px;
  margin-bottom: 8px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.search-result-item:hover { border-color: var(--accent); }
.sr-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  color: var(--ink);
  margin-bottom: 4px;
}
.sr-meta { font-size: 12px; color: var(--ink-light); margin-bottom: 6px; }
.sr-snippet {
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  color: var(--ink-mid);
  line-height: 1.8;
}
.sr-snippet mark { background: #fff3b0; color: var(--ink); }

/* ── LOADING / EMPTY ── */
.loading {
  text-align: center; padding: 60px;
  color: var(--ink-light); font-size: 14px;
}
.empty { text-align: center; padding: 60px; color: var(--ink-light); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--paper-warm); }
::-webkit-scrollbar-thumb { background: var(--paper-border); border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <div class="logo" onclick="navigate('home')">
    <span>經</span>한국경학자료집성
  </div>
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="格物致知, 正心誠意 등 검색..." 
           onkeydown="if(event.key==='Enter')doSearch()">
    <button id="search-btn" onclick="doSearch()">검색</button>
  </div>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">경전 목록</div>
      <div id="classic-list"></div>
    </div>
  </div>
  <div id="main">
    <div class="loading">로딩 중...</div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────
let state = {
  classics: [],
  currentClassic: null,
  currentChapter: null,
  currentBook: null,
  view: 'home'
};

// ─── API ──────────────────────────────────────────────────────
async function api(path) {
  const res = await fetch('/api' + path);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ─── INIT ─────────────────────────────────────────────────────
async function init() {
  try {
    const [classics, stats] = await Promise.all([
      api('/classics'),
      api('/stats')
    ]);
    state.classics = classics;
    renderSidebar();
    renderHome(stats);
  } catch(e) {
    document.getElementById('main').innerHTML = 
      `<div class="empty">DB 연결 오류: ${e.message}</div>`;
  }
}

// ─── SIDEBAR ──────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('classic-list');
  list.innerHTML = state.classics.map(c => `
    <div class="classic-item ${state.currentClassic?.code === c.code ? 'active' : ''}"
         onclick="selectClassic('${c.code}')">
      <span class="classic-cn">${c.name_cn}</span>
      <span class="classic-kr">${c.name_kr}</span>
      <span class="classic-count">${c.book_count}종</span>
    </div>
    ${state.currentClassic?.code === c.code ? renderChapterList() : ''}
  `).join('');
}

function renderChapterList() {
  if (!state.currentClassicData) return '';
  const chapters = state.currentClassicData.chapters || [];
  return `<div class="chapter-list">` +
    chapters.map(ch => `
      <div class="chapter-item ${state.currentChapter === ch.chapter_std ? 'active' : ''}"
           onclick="selectChapter('${state.currentClassic.code}', '${encodeURIComponent(ch.chapter_std)}')">
        <span>${ch.chapter_std}</span>
        <span class="chapter-count">${ch.book_count}</span>
      </div>
    `).join('') +
  `</div>`;
}

// ─── NAVIGATE ─────────────────────────────────────────────────
function navigate(view, params = {}) {
  state.view = view;
  Object.assign(state, params);
}

// ─── HOME ─────────────────────────────────────────────────────
function renderHome(stats) {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="home-header">
      <div class="home-title-cn">韓國經學資料集成</div>
      <div class="home-title">한국경학자료집성</div>
      <div class="home-desc">
        조선시대 경학 문헌 ${stats.books.toLocaleString()}종과 중국 원전을 통합 열람합니다.<br>
        경전의 장(章)을 선택하면 모든 주석을 한 화면에서 대조할 수 있습니다.
      </div>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-num">${stats.books.toLocaleString()}</div>
          <div class="stat-label">문헌</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${stats.sections.toLocaleString()}</div>
          <div class="stat-label">편목</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${(stats.total_chars/10000).toFixed(0)}만</div>
          <div class="stat-label">글자</div>
        </div>
        <div class="stat-item">
          <div class="stat-num">${stats.classics}</div>
          <div class="stat-label">경전</div>
        </div>
      </div>
    </div>
    <div class="classics-grid" id="classics-grid"></div>
  `;
  const grid = document.getElementById('classics-grid');
  grid.innerHTML = state.classics.map(c => `
    <div class="classic-card" onclick="selectClassic('${c.code}')">
      <div class="card-cn">${c.name_cn}</div>
      <div class="card-kr">${c.name_kr}</div>
      <div class="card-stats">
        문헌 <span>${c.book_count}</span>종<br>
        ${(c.total_chars/10000).toFixed(1)}만자
      </div>
    </div>
  `).join('');
}

// ─── CLASSIC SELECT ───────────────────────────────────────────
async function selectClassic(code) {
  state.currentClassic = state.classics.find(c => c.code === code);
  state.currentChapter = null;
  document.getElementById('main').innerHTML = '<div class="loading">로딩 중...</div>';
  
  const data = await api(`/classic/${code}`);
  state.currentClassicData = data;
  renderSidebar();
  renderClassicView(data);
}

function renderClassicView(data) {
  const { classic, books, chapters } = data;
  const main = document.getElementById('main');
  
  const byVolume = {};
  books.forEach(b => {
    const v = b.volume || 0;
    if (!byVolume[v]) byVolume[v] = [];
    byVolume[v].push(b);
  });

  main.innerHTML = `
    <div class="chapter-view-header">
      <div class="chapter-view-title">
        ${classic.name_cn} <span style="font-family:'Noto Serif KR',serif;font-size:18px">${classic.name_kr}</span>
        <span class="chapter-view-classic">문헌 ${books.length}종</span>
      </div>
    </div>
    <div style="margin-bottom:24px">
      <div style="font-size:13px;color:var(--ink-light);margin-bottom:10px;letter-spacing:1px">장별 집성 열람</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${chapters.map(ch => `
          <div onclick="selectChapter('${classic.code}','${encodeURIComponent(ch.chapter_std)}')"
               style="padding:6px 14px;border:1px solid var(--paper-border);background:#fff;cursor:pointer;
                      font-family:'Noto Serif SC',serif;font-size:14px;border-radius:2px;transition:all 0.15s"
               onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--red)'"
               onmouseout="this.style.borderColor='var(--paper-border)';this.style.color='var(--ink)'">
            ${ch.chapter_std}
            <span style="font-size:11px;color:var(--ink-light);margin-left:4px">${ch.book_count}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div style="font-size:13px;color:var(--ink-light);margin-bottom:10px;letter-spacing:1px">문헌 목록</div>
    ${Object.entries(byVolume).sort((a,b)=>a[0]-b[0]).map(([vol, bks]) => `
      <div style="margin-bottom:24px">
        <div style="font-size:12px;color:var(--ink-light);margin-bottom:8px;
                    border-left:3px solid var(--red);padding-left:8px">제${vol}책</div>
        ${bks.map(b => `
          <div onclick="selectBook('${b.sj_id}')"
               style="display:flex;align-items:baseline;gap:12px;padding:8px 12px;
                      background:#fff;border:1px solid var(--paper-border);margin-bottom:4px;
                      cursor:pointer;border-radius:2px;transition:all 0.15s"
               onmouseover="this.style.borderColor='var(--accent)'"
               onmouseout="this.style.borderColor='var(--paper-border)'">
            <span style="font-family:'Noto Serif KR',serif;font-size:15px;flex:1">${b.name}</span>
            <span style="font-size:11px;color:var(--ink-light)">${b.section_count}편</span>
            <span style="font-size:11px;color:var(--ink-light)">${(b.total_chars/1000).toFixed(1)}천자</span>
          </div>
        `).join('')}
      </div>
    `).join('')}
  `;
}

// ─── CHAPTER VIEW (핵심 기능) ─────────────────────────────────
async function selectChapter(code, chapterEncoded) {
  const chapter = decodeURIComponent(chapterEncoded);
  state.currentChapter = chapter;
  document.getElementById('main').innerHTML = '<div class="loading">집성 중...</div>';
  
  const data = await api(`/chapter/${code}/${chapterEncoded}`);
  renderSidebar();
  renderChapterView(data, code);
}

function renderChapterView(data, code) {
  const { chapter, korean, chinese, stats } = data;
  const classic = state.classics.find(c => c.code === code);
  const main = document.getElementById('main');

  let html = `
    <div class="chapter-view-header">
      <div class="chapter-view-title">
        ${chapter}
        <span class="chapter-view-classic">${classic?.name_cn || ''} ${classic?.name_kr || ''}</span>
      </div>
      <div class="chapter-stats">
        한국 주석 <strong>${stats.korean_count}종</strong> · 
        총 <strong>${(stats.total_chars/1000).toFixed(1)}천자</strong>
      </div>
    </div>
  `;

  // 중국 원문
  if (chinese.rawText?.length) {
    html += `<div class="source-block">
      <div class="source-block-header chinese">原文</div>
      <div class="source-block-content">${escHtml(chinese.rawText[0].content)}</div>
    </div>`;
  }

  // 주자 집주
  if (chinese.jizhu?.length) {
    html += `<div class="source-block">
      <div class="source-block-header jizhu">朱子 集註</div>
      <div class="source-block-content">${escHtml(chinese.jizhu[0].content)}</div>
    </div>`;
  }

  // 기타 중국 주석
  chinese.otherChinese?.forEach(ct => {
    html += `<div class="source-block">
      <div class="source-block-header" style="background:#3a2a4a">${ct.title}</div>
      <div class="source-block-content">${escHtml(ct.content)}</div>
    </div>`;
  });

  // 한국 주석 집성
  html += `
    <div class="annotation-section">
      <div class="annotation-section-title">
        <span>韓國 經學 注釋 集成</span>
        <span class="annotation-count">${stats.korean_count}종</span>
      </div>
  `;

  // 필터 (시대별은 데이터에 dynasty 있을 때만)
  const dynasties = [...new Set(korean.map(k => k.dynasty).filter(Boolean))];
  if (dynasties.length > 1) {
    html += `<div class="filter-bar">
      <button class="filter-btn active" onclick="filterAnnotations('all',this)">전체</button>
      ${dynasties.map(d => `<button class="filter-btn" onclick="filterAnnotations('${d}',this)">${d}</button>`).join('')}
    </div>`;
  }

  // 전체 펼치기/접기
  html += `<div style="margin-bottom:12px;display:flex;gap:8px">
    <button class="filter-btn" onclick="toggleAll(true)">전체 펼치기</button>
    <button class="filter-btn" onclick="toggleAll(false)">전체 접기</button>
  </div>`;

  html += `<div id="annotations-list">`;
  korean.forEach((k, i) => {
    html += `
      <div class="annotation-card" data-dynasty="${k.dynasty || ''}" id="ann-${i}">
        <div class="annotation-card-header" onclick="toggleAnnotation(${i})">
          <span class="ann-book-name">${k.book_name}</span>
          ${k.author ? `<span class="ann-meta">저자: ${k.author}</span>` : ''}
          ${k.dynasty ? `<span class="ann-meta">${k.dynasty}</span>` : ''}
          <span class="ann-chars">${(k.chars/1000).toFixed(1)}천자 ▾</span>
        </div>
        <div class="annotation-card-body" id="body-${i}">
          <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
            <button class="go-chapter-btn" onclick="event.stopPropagation();selectBook('${k.sj_id}')">
              문헌 전체 보기
            </button>
          </div>
          ${escHtml(k.content || '(본문 없음)')}
        </div>
      </div>
    `;
  });

  html += `</div></div>`;
  main.innerHTML = html;

  // 첫 3개 자동 펼치기
  [0, 1, 2].forEach(i => {
    const body = document.getElementById(`body-${i}`);
    if (body) body.classList.add('open');
  });
}

function toggleAnnotation(i) {
  const body = document.getElementById(`body-${i}`);
  body?.classList.toggle('open');
}

function toggleAll(open) {
  document.querySelectorAll('.annotation-card-body')
    .forEach(el => el.classList[open ? 'add' : 'remove']('open'));
}

function filterAnnotations(dynasty, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.annotation-card').forEach(el => {
    el.style.display = dynasty === 'all' || el.dataset.dynasty === dynasty ? '' : 'none';
  });
}

// ─── BOOK VIEW ────────────────────────────────────────────────
async function selectBook(sj_id) {
  document.getElementById('main').innerHTML = '<div class="loading">로딩 중...</div>';
  const data = await api(`/book/${sj_id}`);
  renderBookView(data);
}

function renderBookView(data) {
  const { book, sections } = data;
  const main = document.getElementById('main');

  const toc = sections.map((s, i) => `
    <div class="toc-item" onclick="document.getElementById('sec-${i}').scrollIntoView({behavior:'smooth'})">
      <span>${s.chapter_name}</span>
      <span class="toc-chapter-link" onclick="event.stopPropagation();selectChapter('${book.classic_code}','${encodeURIComponent(s.chapter_std || s.chapter_name)}')">
        집성→
      </span>
    </div>
  `).join('');

  const content = sections.map((s, i) => `
    <div class="section-block" id="sec-${i}">
      <div class="section-header">
        <span>${s.chapter_name}</span>
        <button class="go-chapter-btn" 
                onclick="selectChapter('${book.classic_code}','${encodeURIComponent(s.chapter_std || s.chapter_name)}')">
          ${s.chapter_std || s.chapter_name} 집성 보기
        </button>
      </div>
      <div class="section-content">${escHtml(s.content || '(본문 없음)')}</div>
    </div>
  `).join('');

  main.innerHTML = `
    <div class="book-view">
      <div class="book-toc">
        <div class="book-toc-title">목차</div>
        ${toc}
      </div>
      <div class="book-content">
        <div class="book-header">
          <div class="book-title">${book.name}</div>
          <div class="book-meta-row">
            <span>${book.classic_cn} ${book.classic_kr}</span>
            ${book.volume ? `<span>제${book.volume}책</span>` : ''}
            ${book.author ? `<span>저자: ${book.author}</span>` : ''}
            ${book.dynasty ? `<span>${book.dynasty}</span>` : ''}
          </div>
        </div>
        ${book.haeje ? `<div class="book-haeje"><strong>해제</strong><br><br>${escHtml(book.haeje)}</div>` : ''}
        ${content}
      </div>
    </div>
  `;
}

// ─── SEARCH ───────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  document.getElementById('main').innerHTML = '<div class="loading">검색 중...</div>';

  const data = await api(`/search?q=${encodeURIComponent(q)}&limit=50`);
  renderSearchResults(q, data);
}

function renderSearchResults(q, data) {
  const { results, chineseResults } = data;
  const main = document.getElementById('main');

  let html = `
    <div class="chapter-view-header">
      <div class="chapter-view-title">검색: ${escHtml(q)}</div>
      <div class="chapter-stats">한국 주석 <strong>${results.length}</strong>건 · 
        중국 원전 <strong>${chineseResults?.length || 0}</strong>건</div>
    </div>
  `;

  if (!results.length && !chineseResults?.length) {
    html += '<div class="empty">검색 결과가 없습니다.</div>';
  }

  if (chineseResults?.length) {
    html += `<div style="margin-bottom:16px;font-size:13px;color:var(--ink-light)">중국 원전</div>`;
    chineseResults.forEach(r => {
      html += `<div class="search-result-item" 
                    onclick="selectChapter('${r.classic_code}','${encodeURIComponent(r.chapter_name)}')">
        <div class="sr-title">${r.title} · ${r.chapter_name}</div>
        <div class="sr-meta">${r.source}</div>
        <div class="sr-snippet">${r.snippet}</div>
      </div>`;
    });
    html += `<div style="margin:16px 0 8px;font-size:13px;color:var(--ink-light)">한국 주석</div>`;
  }

  results.forEach(r => {
    html += `<div class="search-result-item"
                  onclick="selectChapter('${r.classic_code}','${encodeURIComponent(r.chapter_name)}')">
      <div class="sr-title">${r.book_name} · ${r.chapter_name}</div>
      <div class="sr-meta">${r.classic_code} · ${r.sj_id}</div>
      <div class="sr-snippet">${r.snippet}</div>
    </div>`;
  });

  main.innerHTML = html;
}

// ─── UTILS ────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── START ────────────────────────────────────────────────────
init();
</script>
